name: Node.js Package

on:
  release:
    types: [created]

permissions:
  contents: read      # Default, but explicit is good
  id-token: write     # Required for OIDC/trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish --provenance
        # Uses npm trusted publishing (OIDC). Requires the GitHub repo to be linked on npmjs.com.
